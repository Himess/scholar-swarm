[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
cache_path = "cache"
libs = ["lib"]
solc_version = "0.8.27"
optimizer = true
optimizer_runs = 200
via_ir = true
verbosity = 2
gas_reports = ["*"]
fs_permissions = [{ access = "read-write", path = "./" }]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"

[rpc_endpoints]
og_testnet = "${OG_RPC_URL}"

[etherscan]
og_testnet = { key = "${OG_EXPLORER_KEY}", url = "${OG_EXPLORER_URL}" }
